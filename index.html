<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>𝗗𝗜𝗟𝗟𝗭𝗬</title>

<style>
body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:#e9eef3;
    display:flex;
    justify-content:center;
    padding:12px;
}
.container{
    width:100%;
    max-width:480px;
    display:flex;
    flex-direction:column;
    gap:15px;
}
    .btn.primary{background:#ff6b6b;color:#fff}
.btn.secondary{background:#fff;color:#ff6b6b;border:1px solid #ffd1d1}
    .primary{
background:#0d6efd;
color:#fff;
border:none;
}

.secondary{
background:#f1f1f1;
color:#000;
border:none;
}
.card{
    background:linear-gradient(135deg,#0d6efd,#0a58ca);
    border-radius:14px;
    padding:18px;
    color:#fff;
    text-align:center;
    box-shadow:0 6px 18px rgba(0,0,0,0.15);
}
.header{
    font-size:22px;
    font-weight:700;
}
.video-wrapper{
    background:#000;
    border-radius:14px;
    overflow:hidden;
    position:relative;
    padding-top:56.25%;
    box-shadow: 0 0 0 3px #0d6efd;
    margin-bottom: 30px;
}
.video-wrapper iframe{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    border:0;
}
.error-box{
    display:none;
    background:#ff4d4d;
    color:#fff;
    padding:14px;
    border-radius:10px;
    font-weight:500;
}
.community h3{
    margin:0 0 14px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
}
.buttons{
    display:flex;
    gap:12px;
    justify-content:center;
}
.btn{
    flex:1;
    background:transparent;
    border:2px solid #fff;
    border-radius:30px;
    padding:10px;
    color:#fff;
    font-weight:600;
    text-decoration:none;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    transition:.3s;
}
.btn:hover{
    background:#fff;
    color:#0d6efd;
}
.btn svg{
    width:18px;
    height:18px;
    fill:currentColor;
}
.share-btn{
    background:#fff;
    color:#0d6efd;
    border:none;
    border-radius:10px;
    padding:12px;
    font-weight:700;
    cursor:pointer;
    width:100%;
}
.popup{
  position:fixed;
  inset:0;
  background:rgba(255,255,255,.9);
  backdrop-filter:blur(6px);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
}
.popup-box{
  background:rgba(0,0,0,.35);;
  padding:22px 20px;
  border-radius:20px;
  text-align:center;
  width:90%;
  max-width:340px;
}
.popup-content{display:flex;flex-direction:column;gap:12px}
</style>
</head>

<body>
<div class="popup" id="popup">
  <div class="popup-box">
    <h2>Welcome 🤩</h2>
    <p>Join Telegram for live match updates</p>
    <div class="popup-content">
      <a class="btn primary" href="https://t.me/CricxCrate" target="_blank">Join @CricxCrate</a>
      <button class="btn secondary" onclick="closePopup()">Already Joined</button>
    </div>
  </div>
</div>

<div class="container">

<div class="card header">
ELITExCORE
</div>

<div class="video-wrapper">
    <div id="player-container"></div>
</div>

<div id="errorBox" class="error-box">
Invalid or unavailable stream ID.
</div>

<div class="card community">
<h3>
Join our community for live match clips and live updates!
</h3>

<div class="buttons">
<a href="https://t.me/Elitexcore" class="btn">
<svg viewBox="0 0 24 24">
<path d="M9.04 15.47l-.4 5.65c.57 0 .82-.25 1.13-.55l2.72-2.6 5.64 4.13c1.03.57 1.76.27 2.04-.95l3.7-17.37c.36-1.65-.6-2.3-1.6-1.92L1.66 9.74c-1.58.61-1.55 1.5-.27 1.9l5.58 1.74L19.46 5.6c.58-.36 1.1-.16.67.2"/>
</svg>
Telegram
</a>
</div>
</div>

<div class="card">
<h3>Copy Link & Open In Chrome Browser Only</h3>
<button class="share-btn" id="shareBtn">Share This Page Link</button>
</div>

</div>

<script>
/* POPUP */
const popup=document.getElementById("popup");
function closePopup(){
  popup.style.display="none";
}
document.addEventListener("DOMContentLoaded",function(){


// GET ID PARAM
const params=new URLSearchParams(window.location.search);
const id=params.get("id");

const playerContainer=document.getElementById("player-container");
const errorBox=document.getElementById("errorBox");

if(!id){
    errorBox.style.display="block";
    return;
}

// FETCH JSON
fetch("https://allrounderid2.pages.dev/id.json")
.then(res=>res.json())
.then(data=>{

if(!data.iframes || !Array.isArray(data.iframes)){
    errorBox.style.display="block";
    return;
}

const match=data.iframes.find(item=>item.id===id);

if(match && match.iframeSrc){
    playerContainer.innerHTML=`
        <iframe 
            src="${match.iframeSrc}" 
            allow="encrypted-media; autoplay" 
            allowfullscreen>
        </iframe>
    `;
}else{
    errorBox.style.display="block";
}

})
.catch(()=>{
errorBox.style.display="block";
});

document.getElementById("shareBtn").onclick=function(){
navigator.clipboard.writeText(window.location.href)
.then(()=>alert("Link Copied"));
};

});

</script>

</body>
</html>
